<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0d10"/>
      <stop offset="100%" stop-color="#14171c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2b6cff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#2b6cff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#2b6cff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- faint circuit-grid texture -->
  <g stroke="#ffffff" stroke-opacity="0.035" stroke-width="1">
    <line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="150" y1="0" x2="150" y2="300"/>
    <line x1="1050" y1="0" x2="1050" y2="300"/>
  </g>
  <g fill="#2b6cff" fill-opacity="0.5">
    <circle cx="150" cy="60" r="2.5"/>
    <circle cx="1050" cy="60" r="2.5"/>
    <circle cx="150" cy="240" r="2.5"/>
    <circle cx="1050" cy="240" r="2.5"/>
  </g>

  <!-- headline -->
  <text x="600" y="140" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-size="56" font-weight="700" letter-spacing="-1.5" fill="#f5f6f7">
    Ashmit Singh
  </text>

  <!-- subtitle -->
  <text x="600" y="178" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif"
        font-size="20" font-weight="400" letter-spacing="0.2" fill="#9aa1ab">
    Robotics &amp; Embedded Systems Engineer
  </text>

  <!-- accent divider -->
  <rect x="500" y="204" width="200" height="1.5" fill="url(#accent)"/>

  <!-- footer line -->
  <text x="600" y="234" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif"
        font-size="14" font-weight="500" letter-spacing="1.6" fill="#5c6470">
    VIT VELLORE  ·  ELECTRONICS ENGINEERING (VLSI)  ·  ROS2 · CV · EMBEDDED
  </text>
</svg>
